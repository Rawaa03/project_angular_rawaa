<div class="mt-8 bg-white p-6 rounded-3xl shadow-lg border border-rose-300">

  <h2 class="text-2xl font-bold text-rose-600">
    {{ project.name }}
  </h2>

  <p class="text-rose-400">
    {{ project.description }}
  </p>

  <p class="text-sm text-rose-500 mt-1">
    Statut : {{ project.status }}
  </p>

  <app-task-list [tasks]="project.tasks"></app-task-list>

</div>
