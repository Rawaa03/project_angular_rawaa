<div class="mt-4 space-y-3">

  @for (task of tasks; track task.title) {
    <div
      class="p-3 border-l-4 rounded-xl shadow-sm"
      [ngClass]="getColor(task.status)">

      <p class="font-semibold text-rose-600">
        🌸 {{ task.title }}
      </p>

      <p class="text-sm text-rose-400">
        Priorité : {{ task.priority }} · {{ task.status }}
      </p>
    </div>
  }

</div>
