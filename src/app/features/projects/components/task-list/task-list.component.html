@if (tasks.length === 0) {
  <p class="text-rose-400 italic mt-4">
    Aucune tâche
  </p>
} @else {

  <div class="mt-4 space-y-3">

    @for (task of tasks; track task.title) {
      <div
        class="p-4 border-l-4 rounded-2xl shadow-sm"
        [ngClass]="getStatusClass(task.status)">
        <p
          class="font-semibold"
          [ngClass]="task.priority | priorityColor">
          💗 {{ task.title }}
        </p>

        <p class="text-sm text-rose-400">
          Priorité : {{ task.priority }} · {{ task.status }}
        </p>

      </div>
    }

  </div>
}
