
<input
  type="text"
  placeholder="🔍 Rechercher un projet"
  [(ngModel)]="searchTerm"
  class="w-full mb-6 p-3 rounded-xl border border-rose-300 focus:outline-none"
/>

@if (filteredProjects.length === 0) {
  <p class="text-center text-rose-500 font-medium">
    Aucun projet trouvé
  </p>
}

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  @for (project of filteredProjects; track project.name) {
    <div class="bg-white p-5 rounded-2xl shadow-md border border-rose-200">

      <h2 class="text-xl font-bold text-rose-600">
        {{ project.name }}
      </h2>

      <p class="text-rose-400">
        {{ project.description }}
      </p>

      <span class="text-sm text-rose-500 font-medium">
        {{ project.status }}
      </span>

      <button
        (click)="selectProject(project)"
        class="mt-3 px-4 py-1 rounded-full bg-rose-500 text-white hover:bg-rose-600">
        Voir détails
      </button>

    </div>
  }

</div>

@if (selectedProject) {
  <app-project-detail [project]="selectedProject"></app-project-detail>
}
