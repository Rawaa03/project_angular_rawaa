@if (message) {
  <div class="toast">
    {{ message }}
  </div>
}

<div class="p-6">

  <h1 class="text-2xl font-bold text-pink-500 mb-4">
    🌸 Liste des projets
  </h1>

  <!-- 🔥 FORMULAIRE AJOUT -->
  <div class="card mb-4">

    <input [(ngModel)]="newProjectName"
           placeholder="Nom du projet"
           class="border p-2 rounded w-full mb-2" />

    <input [(ngModel)]="newProjectDesc"
           placeholder="Description"
           class="border p-2 rounded w-full mb-2" />

    <button class="btn" (click)="addProject()">
      ➕ Ajouter projet
    </button>

  </div>

  <!-- 🔥 DASHBOARD -->
  <app-dashboard [projects]="projects"></app-dashboard>

  <!-- 🔥 LISTE PROJETS -->
  @for (project of projects; track project.name) {

    <div class="card mb-3">

      <div class="flex justify-between items-center">

        <div (click)="selectProject(project)" class="cursor-pointer w-full">

          <h2 class="text-lg font-semibold text-pink-600">
            {{ project.name }}
          </h2>

          <p class="text-sm text-gray-400">
            {{ project.description }}
          </p>

        </div>

        <button class="btn bg-red-400 ml-2"
                (click)="deleteProject(project)">
          ❌
        </button>

      </div>

    </div>
  }

  <!-- 🔥 DETAIL -->
  @if (selectedProject) {
    <app-project-detail
      [project]="selectedProject"
      (notify)="showMessage($event)">
    </app-project-detail>
  }

</div>
